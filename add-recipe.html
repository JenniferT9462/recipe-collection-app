<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recipe Collection App</title>
    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Bootstrap navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark custom-green">
      <div class="container-fluid">
        <a class="navbar-brand tan-text" href="index.html">
          <img
            src="assets/arcticons--enrecipes.svg"
            alt="Logo"
            width="40"
            height="34"
            class="d-inline-block align-text-top"
          />
          Recipe Collection App
        </a>

        <div class="ms-auto">
          <a href="search-recipes.html" class="btn btn-tan-outline btn-sm me-2"
            >Search Recipes</a
          >
          <a href="add-recipe.html" class="btn btn-tan-outline btn-sm me-2"
            >Add Recipe</a
          >
          <a href="view-recipe.html" class="btn btn-tan-outline btn-sm me-2"
            >View Recipe</a
          >
        </div>
      </div>
    </nav>

    <!-- Add recipe form -->
    <div class="container-fluid my-5">
      <h1 class="tan-text">Add a New Recipe</h1>

      <form id="recipe-form">
        <!-- Recipe Name -->
        <div class="mb-3">
          <label for="recipe-name" class="form-label">Recipe Name</label>
          <input type="text" class="form-control" id="recipe-name" required />
        </div>

        <!-- Ingredients -->
        <div class="mb-5">
          <label class="form-label">Ingredients</label>
          <div id="ingredients-container"></div>
          <button
            type="button"
            id="add-ingredient-btn"
            class="btn btn-outline-success btn-sm mt-2"
          >
            + Add Ingredient
          </button>
        </div>

        <!-- Instructions -->
        <div class="mb-5">
          <label class="form-label">Instructions</label>
          <div id="instructions-container"></div>
          <button
            type="button"
            id="add-instruction-btn"
            class="btn btn-outline-success btn-sm mt-2"
          >
            + Add Step
          </button>
        </div>

        <!-- Category -->
        <div class="mb-5">
          <label for="category" class="form-label">Category</label>
          <select class="form-select" id="category" required>
            <option value="" disabled selected>Select a category</option>
            <option>Breakfast</option>
            <option>Lunch</option>
            <option>Dinner</option>
            <option>Dessert</option>
          </select>
        </div>

        <!-- Image upload -->
        <div class="mb-3">
          <label for="recipe-image" class="form-label"
            >Recipe Image (optional)</label
          >
          <input
            type="file"
            class="form-control"
            id="recipe-image"
            accept="image/*"
          />
        </div>

        <!-- Submit -->
        <button id="search-btn" type="submit" class="btn btn-success">
          Add Recipe
        </button>
        <button type="reset" class="btn btn-success">Reset Form</button>
      </form>
      <p id="status-message" class="mt-3"></p>
    </div>

    <script src="js/helpers-full.js"></script>
    <script src="js/recipes-shared.js"></script>
    <script src="js/add-recipe.js"></script>
   
    
  </body>
</html>
