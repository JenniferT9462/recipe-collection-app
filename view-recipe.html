<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recipe Collection App</title>
    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Bootstrap navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark custom-green">
      <div class="container-fluid">
        <a class="navbar-brand tan-text" href="index.html">
          <img
            src="assets/arcticons--enrecipes.svg"
            alt="Logo"
            width="40"
            height="34"
            class="d-inline-block align-text-top"
          />
          Recipe Collection App
        </a>

        <div class="ms-auto">
          <a href="search-recipes.html" class="btn btn-tan-outline btn-sm me-2"
            >Search Recipes</a
          >
          <a href="add-recipe.html" class="btn btn-tan-outline btn-sm me-2"
            >Add Recipe</a
          >
          <a href="view-recipe.html" class="btn btn-tan-outline btn-sm me-2"
            >View Recipe</a
          >
        </div>
      </div>
    </nav>

    <div class="container-fluid my-5">
      <h1 class="tan-text text-center">Your Recipes</h1>

      <!-- Recipe List -->
      <div class="container-fluid my-5">
        <h2 class="tan-text">Recipes</h2>
        <!-- Search -->
        <div class="input-group mb-3">
          <input
            type="text"
            id="search-nput"
            class="form-control"
            placeholder="Search recipes..."
          />
          <button class="btn btn-outline-secondary" id="searchBtn">
            Search
          </button>
        </div>
      </div>


      <hr />
      <!-- Recipe Results -->
      <div id="recipe-list">
        <!-- Recipes will load here dynamically -->
      </div>
      
      <hr />
      <!-- Saved Recipes -->
      <div class="container mt-4">
        <h2 class="tan-text">My Saved Recipes</h2>
        <div id="saved-recipes" class="row"></div>
      </div>
    

      

    <script src="js/helpers-full.js"></script>
    <script src="js/recipes-shared.js"></script>
    <script src="js/view-recipe.js"></script>
  </body>
</html>
